<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MACL — Sign in</title>
<link href="favicon.svg" rel="icon" type="image/svg+xml"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: Inter, system-ui, sans-serif; }
  .code { font-family: "JetBrains Mono", ui-monospace, monospace; }
</style>
</head>
<body class="min-h-screen bg-[#f3f5f4] flex items-center justify-center p-6">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg border border-[#dfe4e2] p-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-[#00322d]">MACL</h1>
      <p class="text-sm text-[#3f4947] mt-1">Multi-Stakeholder Accountability &amp; Compliance Ledger</p>
    </div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-[#515f74] mb-1">Organisation</label>
        <select id="username" class="w-full border border-[#bfc9c6] rounded-lg p-3 text-sm bg-white">
          <option value="donor">Donor</option>
          <option value="ngo">NGO</option>
          <option value="audit">Government / Audit</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-[#515f74] mb-1">Password</label>
        <div class="relative">
          <input id="password" type="password" autocomplete="current-password"
                 class="w-full border border-[#bfc9c6] rounded-lg p-3 pr-16 text-sm" placeholder="••••••••"/>
          <button id="togglePassword" type="button" aria-label="Show password" aria-pressed="false"
                  class="absolute inset-y-0 right-0 px-3 text-xs font-semibold uppercase tracking-wider text-[#515f74] hover:text-[#00322d]">
            Show
          </button>
        </div>
      </div>
      <button id="loginBtn" type="submit"
              class="w-full bg-[#00322d] text-white rounded-lg py-3 text-sm font-semibold hover:opacity-90 active:scale-[.99] transition">
        Sign in
      </button>
      <p id="loginErr" class="text-xs text-[#ba1a1a] hidden"></p>
    </form>

    <p class="text-[11px] text-[#515f74] mt-6 leading-relaxed">
      Sign in with your organisation's account.
    </p>
  </div>

  <script>
    (function () {
      var btn = document.getElementById('togglePassword');
      var input = document.getElementById('password');
      btn.addEventListener('click', function () {
        var show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? 'Hide' : 'Show';
        btn.setAttribute('aria-pressed', String(show));
        btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        input.focus();
      });
    })();
  </script>
  <script src="config.js"></script>
  <script src="js/chain.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
