# The centralised PostgreSQL baseline — the RQ3 control group.
# Deliberately a plain, single instance with NO replication, NO audit log and
# NO integrity fingerprints: that is exactly the centralised design MACL is
# being compared against. Data is ephemeral (no named volume) so every run
# starts from a clean, reproducible state.
services:
  postgres:
    image: postgres:16-alpine
    container_name: macl-eval-postgres
    environment:
      POSTGRES_USER: macl
      POSTGRES_PASSWORD: macl
      POSTGRES_DB: macl_baseline
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macl -d macl_baseline"]
      interval: 3s
      timeout: 3s
      retries: 10
